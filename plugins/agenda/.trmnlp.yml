# TRMNLP configuration
# {{ env.VARIABLE }} interpolation is available here
---
# auto-reload when files change (`watch: false` to disable)
watch:
  - .trmnlp.yml
  - src

# values of custom fields (defined in src/settings.yml)
custom_fields:
  view_mode: basic_list
  show_event_descriptions: false
  text_density: comfortable
# override variables
variables:
  trmnl:
    user:
      locale: en-US
      time_zone: America/Denver
      time_zone_iana: America/Denver
      utc_offset: -21600
