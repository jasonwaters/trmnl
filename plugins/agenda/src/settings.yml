---
strategy: webhook
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 2.3.7
serverless_language:
polling_url: ''
polling_headers: ''
polling_body: ''
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: Agenda plugin for displaying daily schedules. Supports three view modes - list (upcoming events), basic list (TRMNL framework components), or day grid (SimpleCalendarJS time grid - may clip events). Optimized for e-ink displays.
  category: personal,calendar
  github_url: https://github.com/jasonwaters/trmnl
- keyname: view_mode
  field_type: select
  name: View Mode
  default: list
  options:
  - List: list
  - Basic List: basic_list
  - Day: day
name: Agenda
refresh_interval: 1440
