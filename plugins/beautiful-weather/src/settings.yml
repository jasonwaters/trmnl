id: '270447'
custom_fields:
  -
    keyname: plugin_author
    name: 'About This Plugin'
    category: productivity
    field_type: author_bio
    email_address: trmnl@truenorth.software
    description: 'today: beautiful weather surfaces your local weather forecast in a beautiful compact, glanceable grid. powered by the open-meteo API.'
  -
    keyname: location_name
    name: 'Weather Location'
    field_type: string
    required: true
    placeholder: 'New York, NY'
    help_text: 'Choose a location label shown on the widget header. Could be the city name or a nickname for your favorite weather spot (home, work, beach, ski resort, etc).'
    default: 'New York, NY'
  -
    keyname: latitude
    name: Latitude
    field_type: string
    required: true
    placeholder: '40.242067851432246'
    default: '40.242067851432246'
    help_text: '1-click copy: open <a href="https://maps.google.com">Google Maps</a>, right-click your spot, then click the first coordinates row. Paste the first value here.'
  -
    keyname: longitude
    name: Longitude
    field_type: string
    required: true
    placeholder: '-74.03059810259519'
    default: '-74.03059810259519'
    help_text: 'From the same Google Maps coordinates row, paste the second value here.'
  -
    keyname: temperature_unit
    name: 'Temperature Unit'
    field_type: select
    required: true
    options:
      -
        Fahrenheit: fahrenheit
      -
        Celsius: celsius
    help_text: 'Choose Celsius or Fahrenheit.'
    default: fahrenheit
  -
    keyname: wind_speed_unit
    name: 'Wind Speed Unit'
    field_type: select
    required: true
    options:
      -
        km/h: kmh
      -
        m/s: ms
      -
        mph: mph
      -
        knots: kn
    help_text: 'Choose the wind speed unit from Open-Meteo supported options.'
    default: kmh
  -
    keyname: precipitation_unit
    name: 'Precipitation Unit'
    field_type: select
    required: true
    options:
      -
        Millimeter: mm
      -
        Inch: inch
    help_text: 'Choose millimeter or inch for precipitation values.'
    default: mm
  -
    keyname: force_light_mode
    name: 'Force Light Mode'
    field_type: boolean
    default: false
    category: display
    help_text: 'Flip to high-contrast light mode for bright environments.'
