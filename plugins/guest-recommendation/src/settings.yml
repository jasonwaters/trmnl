name: 'Guest Recommendation'
no_screen_padding: 'no'
dark_mode: 'no'
strategy: polling
polling_verb: get
polling_url: '{{apps_script_url}}?mode={{selection_mode}}'
refresh_interval: 60
id: '982737'
framework_version: 3.1.0
static_data: |-
  {
    "rec_icon": "beach",
    "rec_tag": "Steps Away",
    "rec_title": "Make a Splash at the Lagoon",
    "rec_body": "Your stay includes full Desert Color access \u2014 a 2.5-acre lagoon with sandy beaches just a short walk from the door. Grab the beach chairs from the garage and go.",
    "rec_mode": "sequence",
    "rec_index": 0,
    "rec_count": 14,
    "rec_error": ""
  }
custom_fields:
  - keyname: setup_instructions
    field_type: author_bio
    name: Setup
    description: 'Recommendations live in a Google Sheet with two tabs: <b>data</b> (row 1 headers: icon, tag, title, body; one recommendation per row after) and <b>state</b> (stores a single shared last-shown index in cell B2). A small Google Apps Script Web App reads the sheet and, in sequential mode, advances that index by one on each refresh and writes it back. Follow the plugin README to add the script, deploy it as a Web App (Execute as: Me, Who has access: Anyone), then paste the deployment URL below.'
    github_url: https://github.com/jasonwaters/trmnl/tree/main/plugins/guest-recommendation
    learn_more_url: https://radretreat.com
  - keyname: apps_script_url
    field_type: string
    name: Apps Script Web App URL
    description: 'The deployment URL of your Google Apps Script Web App (ends in /exec). This is what lets the plugin read your sheet and, in sequential mode, advance and remember its place.'
    placeholder: https://script.google.com/macros/s/AKfycb.../exec
  - keyname: selection_mode
    field_type: select
    name: Selection Order
    default: sequence
    options:
      - Show in order (sequential): sequence
      - Show at random: random
    help_text: 'Sequential walks through the data tab one row per refresh and remembers its place in the state tab; Random shows any row each refresh.'
  - keyname: show_title_bar
    field_type: select
    name: Title Bar
    default: 'true'
    options:
      - Show "radretreat.com" title bar: 'true'
      - Hide title bar: 'false'
    help_text: Toggle the bottom title bar on or off.
  - keyname: author_bio
    field_type: author_bio
    name: About This Plugin
    description: Maintained by Jason Waters. A recommendation screen for guests at The Rad Retreat at Desert Color. Each refresh surfaces an amenity, feature, or nearby attraction with matching line art, drawn from a Google Sheet you control.
    category: personal,travel
    github_url: https://github.com/jasonwaters/trmnl
    learn_more_url: https://radretreat.com
