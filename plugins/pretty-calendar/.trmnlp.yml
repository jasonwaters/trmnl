# TRMNLP configuration
---
watch:
  - .trmnlp.yml
  - src
custom_fields:
  show_calendar_items: today_three_column
  show_event_descriptions: 'false'
  show_weeks: '7'
  first_day: 0
  time_format: 'am/pm'
variables:
  trmnl:
    user:
      locale: en-US
      time_zone: America/Denver
      time_zone_iana: America/Denver
      utc_offset: -21600
