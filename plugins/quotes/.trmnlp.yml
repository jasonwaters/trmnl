# TRMNLP configuration
---
watch:
  - .trmnlp.yml
  - src
custom_fields:
  spreadsheet_id: 1234
  quote_selection_mode: random
  specific_quote_row: 5
  sheet_number: 0
  quote_index: 0
  author_index: 1
variables:
  trmnl:
    user:
      locale: en-US
      time_zone: America/Denver
      time_zone_iana: America/Denver
      utc_offset: -21600
