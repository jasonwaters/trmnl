      "data": "quote,author\r\nThe surest way to corrupt a youth is to instruct him to hold in higher esteem those who think alike than those who think differently.,Friedrich Nietzsche\r\nThe truth is that there is nothing noble in being superior to somebody else. The only real nobility is in being superior to your former self.,Whitney Young\r\nSome think it's holding on that makes one strong; sometimes it's letting go.,Sylvia Robinson\r\n\"The more I want to get something done, the less I call it work.\",Richard Bach\r\nBe to her virtues very kind. Be to her faults a little blind.,Matthew Prior\r\nhealthy mutual respect is the best immune system for any relationship.,unknown\r\nThe ancestor of every action is a thought.,Ralph Waldo Emerson\r\n\"We cannot direct the wind, but we can adjust the sails.\",Bertha Calloway\r\n\"When you want what you've never had, you must do what you've never done\",unknown\r\nThe true measure of a man is how he treats someone who can do him absolutely no good.,Samuel Johnson\r\n\"Whether you think that you can, or that you can\u2019t, you are usually right.\",Henry Ford\r\nI care not so much what I am to others as what I am to myself.,Michel de Montaigne\r\n\"Ultimately, the only power to which man should aspire is that which he exercises over himself.\",Elie Wiesel\r\n\"Courage is saying, \"\"Maybe what I'm doing isn't working; maybe I should try something else.\"\"\",Anna Lappe\r\nThe greatest challenge to any thinker is stating the problem in a way that will allow a solution.,Bertrand Russell\r\nNo one gossips about other people's secret virtues.,Bertrand Russell\r\nThe time you enjoy wasting is not wasted time.,Bertrand Russell\r\nWhat you do speaks so loud that I cannot hear what you say.,Ralph Waldo Emerson\r\nThe one serious conviction that a man should have is that nothing is to be taken too seriously.,Nicholas Butler\r\n\"Never let a fool kiss you, and never let a kiss fool you.\",unknown\r\n\"Life is just a mirror, and what you see out there, you must first see inside of you.\",Wally 'Famous' Amos\r\n\"Anything you can do needs to be done, so pick up your tool of choice and get started.\",Ben Linder\r\n\"Intimate relationships cannot substitute for a life plan. But to have any meaning or viability at all, a life plan must include intimate relationships.\",Harriet Lerner\r\nThe end result of kindness is that it draws people to you.,Anita Roddick\r\nHe deserves Paradise who makes his companions laugh.,Koran\r\nMany men can make a fortune but very few can build a family.,J. S. Bryan\r\nThe world is moving so fast these days that the man who says it can't be done is generally interrupted by someone doing it.,Harry Emerson Fosdick\r\nThou shouldst eat to live; not live to eat.,Socrates\r\nYou are today where your thoughts have brought you; you will be tomorrow where your thoughts take you.,James Lane Allen\r\nThe first duty of a leader is to make himself be loved without courting love. To be loved without 'playing up' to anyone - even to himself.,Andre Malraux\r\n\"Her virtue was that she said what she thought, her vice that what she thought didn't amount to much.\",Peter Ustinov\r\nIt seems to me that people have vast potential. Most people can do extraordinary things if they have the confidence or take the risks. Yet most people don't. They sit in front of the telly and treat life as if it goes on forever.,Philip Adams\r\nThere is no greater joy nor greater reward than to make a fundamental difference in someone's life.,Sister Mary Rose McGeady\r\n\"The Foolish Reject What They See, Not What They Think;  The Wise Reject What They Think, Not What They See.\",Huang Po\r\n\"Our bodies communicate to us clearly and specifically, if we are willing to listen to them.\",Shakti Gawain\r\n\"Be sure that it is not you that is mortal, but only your body. For that man whom your outward form reveals is not yourself; the spirit is the true self, not that physical figure which and be pointed out by your 