name: 'Google Sheet Quote'
no_screen_padding: 'no'
dark_mode: 'no'
strategy: polling
static_data: |-
  {
    "data": "principle,principle number,section,How to Win Friends and Influence People\r\n\"Don't criticize, condemn, or complain.\",1,Techniques in Handling People,How to Win Friends and Influence People\r\nGive honest and sincere appreciation.,2,Techniques in Handling People,How to Win Friends and Influence People\r\nArouse in the other person an eager want.,3,Techniques in Handling People,How to Win Friends and Influence People\r\nBecome genuinely interested in other people.,1,Six Ways to Make People Like You,How to Win Friends and Influence People\r\nSmile.,2,Six Ways to Make People Like You,How to Win Friends and Influence People\r\nRemember that a person's name is to that person the sweetest and most important sound in any language.,3,Six Ways to Make People Like You,How to Win Friends and Influence People\r\nBe a good listener. Encourage others to talk about themselves.,4,Six Ways to Make People Like You,How to Win Friends and Influence People\r\nTalk in terms of the other person's interests.,5,Six Ways to Make People Like You,How to Win Friends and Influence People\r\nMake the other person feel important - and do it sincerely.,6,Six Ways to Make People Like You,How to Win Friends and Influence People\r\nThe only way to get the best out of an argument is to avoid it.,1,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\n\"Show respect for the other person's opinions. Never say, \"\"You're wrong.\"\"\",2,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\n\"If you are wrong, admit it quickly and emphatically.\",3,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nBegin in a friendly way.,4,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\n\"Get the other person saying \"\"yes, yes\"\" immediately.\",5,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nLet the other person do a great deal of the talking.,6,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nLet the other person feel that the idea is his or hers.,7,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nTry honestly to see things from the other person's point of view.,8,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nBe sympathetic to the other person's ideas and desires.,9,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nAppeal to the nobler motives.,10,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nDramatize your ideas.,11,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nThrow down a challenge.,12,Win People to Your Way of Thinking,How to Win Friends and Influence People\r\nBegin with praise and honest appreciation.,1,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nCall attention to people's mistakes indirectly.,2,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nTalk about your own mistakes before criticizing the other person.,3,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nAsk questions instead of giving direct orders.,4,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nLet the other person save face.,5,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\n\"Praise the slightest improvement and praise every improvement. Be \"\"hearty in your approbation and lavish in your praise.\"\"\",6,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nGive the other person a fine reputation to live up to.,7,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nUse encouragement. Make the fault seem easy to correct.,8,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People\r\nMake the other person happy about doing the thing you suggest.,9,Be a Leader: How to Change People Without Giving Offense or Arousing Resentment,How to Win Friends and Influence People"
  }
polling_verb: get
polling_url: 'https://docs.google.com/spreadsheets/d/{{spreadsheet_id}}/export?format=csv&gid={{sheet_number}}'
refresh_interval: 1440
id: '121258'
custom_fields:
  -
    keyname: about
    name: About
    field_type: author_bio
    description: 'Display a random quote from a Google Sheet.'
    github_url: 'https://github.com/jasonwaters/trmnl/tree/main/plugins/quotes'
    learn_more_url: 'https://help.usetrmnl.com/en/articles/11400219-using-google-sheets-with-private-plugins'
  -
    keyname: instructions
    name: Instructions
    field_type: author_bio
    description: 'Create a Google Sheet with a quote and an author column, add the <em><b>Anyone with a link can view</b></em> permission, and paste the "Spreadsheet ID" into the field below. Optionally, use a Google Form to easily add quotes to the Sheet.'
    github_url: 'https://github.com/jasonwaters/trmnl/tree/main/plugins/quotes'
    learn_more_url: 'https://help.usetrmnl.com/en/articles/11400219-using-google-sheets-with-private-plugins'
  -
    keyname: spreadsheet_id
    field_type: string
    name: 'Spreadsheet ID'
    description: 'The ID of the Google Sheet'
    placeholder: 19hESY6AbY2ZwBph_ndF3zrw9hG__2NLzsbZTMrTlcPk
    default: 19hESY6AbY2ZwBph_ndF3zrw9hG__2NLzsbZTMrTlcPk
  -
    keyname: quote_selection_mode
    field_type: select
    name: 'Quote Selection'
    default: random
    options:
      - Random Quote: random
      - Specific Quote: specific
    description: 'Choose whether to display a random quote or always show one specific quote row.'
  -
    keyname: specific_quote_row
    field_type: number
    placeholder: '1'
    name: 'Specific Quote Row'
    description: 'Used only when Quote Selection is set to Specific. This is the row number within the quote data starting at 1; detected header rows are ignored automatically.'
    default: 1
  -
    keyname: sheet_number
    field_type: number
    placeholder: '0'
    name: 'Sheet Number'
    description: 'The worksheet tab number to export from the spreadsheet. This maps to the sheet gid in the Google Sheets URL and defaults to 0.'
    default: 0
  -
    keyname: quote_index
    field_type: number
    placeholder: '1'
    name: 'Quote Column Index'
    description: 'The index of the quote column in the Google Sheet. First column index is "0"'
    default: 1
  -
    keyname: author_index
    field_type: number
    placeholder: '1'
    name: 'Author Column Index'
    description: 'The index of the author column in the Google Sheet. First column index is "0".'
    default: 2
  -
    keyname: author
    name: 'About This Plugin'
    field_type: author_bio
    description: 'Maintained by Jason Waters.'
    github_url: 'https://github.com/jasonwaters/trmnl'
    learn_more_url: 'https://jasonwaters.dev'
