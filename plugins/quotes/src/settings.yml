 place is here. Stay in the present. You can do nothing to change the past, and the future will never come exactly as you plan or hope for.\",Dan Millman\r\n\"Life is not measured by the number of breaths we take, but by the moments that take our breath away.\",Anonymous\r\n\"It takes a great deal of courage to stand up to your enemies, but even more to stand up to your friends.\",J. K. Rowling\r\nThe advantage of a bad memory is that one enjoys several times the same good things for the first time.,Friedrich Nietzsche\r\nAn idea isn't worth that much. It's the execution of the idea that has value.,Joel Spolsky\r\n\"It's not who you are underneath, it's what you do that defines you.\",Rachel Dawes (Batman Begins)\r\nThere can be no happiness if the things we believe in are different from the things we do.,Freya Madeline Stark\r\nAlways behave like a duck - keep calm and unruffled on the surface but paddle like the devil underneath.,Jacob Braude\r\nNothing shows a man's character more than what he laughs at.,Johann Wolfgang von Goethe\r\nTrue friends are those who really know you but love you anyway.,Edna Buchanan\r\nIt is with a word as with an arrow - once let loose it does not return.,unknown\r\nA child becomes an adult when he realizes that he has a right not only to be right but also to be wrong.,Thomas Szasz\r\nThe way you overcome shyness is to become so wrapped up in something that you forget to be afraid.,Lady Bird Johnson\r\n\"When the character of a man is not clear to you, look at his friends.\",Japanese Proverb\r\n\"To the well-organized mind, death is but the next great adventure.\",J. K. Rowling\r\n\"Before we set our hearts too much upon anything, let us examine how happy those are who already possess it.\",Francois de La Rochefoucauld\r\nIf you tell the truth you don't have to remember anything.,Mark Twain\r\n\"You can't just ask customers what they want and then try to give that to them. By the time you get it built, they'll want something new.\",St